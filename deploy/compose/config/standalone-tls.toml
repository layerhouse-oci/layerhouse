# Standalone orb-chrysa with TLS + OIDC auth
# Deployed at orb-chrysa.example.com

[server]
listen = "0.0.0.0:443"

[server.tls]
cert_path = "/certs/tls.crt"
key_path = "/certs/tls.key"

[server.limits]
max_concurrent_uploads = 64
max_concurrent_requests = 512

[storage.s3]
endpoint = "http://rustfs:9000"
bucket = "orb-chrysa"
region = "us-east-1"
access_key = "orb-chrysa"
secret_key = "change-me-in-production"
path_style = true

[storage.s3.redirect]
enabled = false

[raft]
listen = "0.0.0.0:5051"
data_dir = "/tmp/raft"
discovery_dns = "orb-chrysa"

[auth]
issuer_url = "https://kani.example.com/oauth2/openid/orb-chrysa"
client_id = "orb-chrysa"
client_secret = "PLACEHOLDER_CLIENT_SECRET"
token_endpoint_url = "https://orb-chrysa.example.com/v2/token"
redirect_uri = "https://orb-chrysa.example.com/oauth2/callback"
token_signing_keys = ["PLACEHOLDER_SIGNING_KEY"]
session_encryption_key = "PLACEHOLDER_ENCRYPTION_KEY"

[[auth.permissions]]
name = "admin-full-access"
groups = ["registry_admins"]
scopes = ["repository:*:*"]

[[auth.permissions]]
name = "developer-access"
groups = ["registry_developers"]
scopes = ["repository:dev/*:push", "repository:dev/*:pull"]
