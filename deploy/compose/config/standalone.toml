# Standalone layerhouse with Caddy reverse proxy (TLS) + OIDC auth
# Deployed at layerhouse.example.com
#
# Caddy handles TLS termination. layerhouse runs plain HTTP internally.

[server]
listen = "0.0.0.0:5050"

[server.limits]
max_concurrent_uploads = 64
max_concurrent_requests = 512

[storage.s3]
endpoint = "http://rustfs:9000"
bucket = "layerhouse"
region = "us-east-1"
access_key = "layerhouse"
secret_key = "change-me-in-production"
path_style = true

[storage.s3.redirect]
enabled = false

[raft]
listen = "0.0.0.0:5051"
data_dir = "/tmp/raft"
discovery_dns = "layerhouse"

[auth]
issuer_url = "https://kani.example.com/oauth2/openid/layerhouse"
client_id = "layerhouse"
client_secret = "PLACEHOLDER_CLIENT_SECRET"
token_endpoint_url = "https://layerhouse.example.com/v2/token"
redirect_uri = "https://layerhouse.example.com/oauth2/callback"
token_signing_keys = ["PLACEHOLDER_SIGNING_KEY"]
session_encryption_key = "PLACEHOLDER_ENCRYPTION_KEY"

[[auth.permissions]]
name = "admin-full-access"
groups = ["registry_admins"]
scopes = ["repository:*:*"]

[[auth.permissions]]
name = "developer-access"
groups = ["registry_developers"]
scopes = ["repository:dev/*:pull,create,update", "repository:dev/*:pull"]
