# Production Docker Compose — single-node layerhouse with RustFS.
#
# Prerequisites:
#   docker compose -f deploy/compose/standalone.yml up -d
#
# This file uses :latest tags. Pin to a specific version for production:
#   ghcr.io/adamcavendish/layerhouse-server:0.0.3

name: layerhouse-standalone

services:
  rustfs:
    image: rustfs/rustfs:1.0.0-beta.6
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-layerhouse}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-change-me-in-production}
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_VOLUMES: /data
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  rustfs-init:
    image: rustfs/rc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-layerhouse}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-change-me-in-production}
    entrypoint: >
      /bin/sh -c "
      RUSTFS_IP=$$(getent hosts rustfs | awk '{print $$1}');
      rc alias set local http://$$RUSTFS_IP:9000 $$RUSTFS_ACCESS_KEY $$RUSTFS_SECRET_KEY;
      rc bucket create local/layerhouse -p;
      "

  layerhouse-0:
    image: ghcr.io/adamcavendish/layerhouse-server:latest
    hostname: layerhouse-0
    ports:
      - "5050:5050"
    volumes:
      - ./config/standalone.toml:/etc/layerhouse/config.toml:ro
    command: ["--config", "/etc/layerhouse/config.toml"]
    depends_on:
      rustfs-init:
        condition: service_completed_successfully
    networks:
      default:
        aliases:
          - layerhouse

volumes:
  rustfs-data:
