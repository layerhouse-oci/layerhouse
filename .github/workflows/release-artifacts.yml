name: Release Artifacts

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-artifacts-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: adamcavendish/layerhouse-server
  CARGO_ZIGBUILD_VERSION: "0.19.7"
  VP_NODE_VERSION: "24.15.0"
  ZIG_VERSION: "0.14.0"

jobs:
  # One matrix job per architecture. Each job cross-compiles its own server
  # binary with cargo-zigbuild, layers it into a minimal Docker image, and
  # pushes by digest so there is no tag race between parallel jobs.
  docker-image:
    name: Docker image (${{ matrix.platform.slug }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arch: linux/amd64
            target: x86_64-unknown-linux-gnu
            slug: linux-amd64
          - arch: linux/arm64
            target: aarch64-unknown-linux-gnu
            slug: linux-arm64
          - arch: linux/arm/v7
            target: armv7-unknown-linux-gnueabihf
            slug: linux-armv7
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-targets: true
          prefix-key: v0-rust-zigbuild-${{ env.CARGO_ZIGBUILD_VERSION }}-zig-${{ env.ZIG_VERSION }}-${{ matrix.platform.slug }}

      - name: Check cargo-zigbuild
        id: cargo-zigbuild
        run: |
          if command -v cargo-zigbuild >/dev/null 2>&1; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
            cargo zigbuild --version
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install cargo-binstall
        if: steps.cargo-zigbuild.outputs.installed != 'true'
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-zigbuild
        if: steps.cargo-zigbuild.outputs.installed != 'true'
        run: cargo binstall cargo-zigbuild --version "$CARGO_ZIGBUILD_VERSION" -y

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install vp (vite-plus) and Node
        run: |
          export VP_HOME="$HOME/.vite-plus"
          export VP_NODE_MANAGER=yes
          mkdir -p "$VP_HOME"
          curl -fsSL https://viteplus.dev/install.sh | bash
          echo "$VP_HOME/bin" >> "$GITHUB_PATH"
          echo "VP_HOME=$VP_HOME" >> "$GITHUB_ENV"

      - name: Install dashboard dependencies
        run: vp install
        working-directory: crates/layerhouse-server/dashboard

      - name: Build ${{ matrix.platform.target }} binary
        run: cargo zigbuild --release -p layerhouse-server --target "${{ matrix.platform.target }}"

      - name: Copy ${{ matrix.platform.target }} binary
        run: |
          cp "target/${{ matrix.platform.target }}/release/layerhouse-server" ./layerhouse-server
          chmod +x ./layerhouse-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/ci/Dockerfile.runtime
          platforms: ${{ matrix.platform.arch }}
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true

      - name: Export digest
        run: echo "${{ steps.build.outputs.digest }}" > "${{ matrix.platform.slug }}.digest"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.platform.slug }}
          path: ${{ matrix.platform.slug }}.digest
          retention-days: 1

  # Stitch the per-architecture images into a single multi-arch manifest
  # and push with all the release tags.
  docker-image-merge:
    needs: docker-image
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Create manifest list and push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          DIGESTS=()
          for f in *.digest; do
            digest="$(tr -d '[:space:]' < "$f")"
            if [ -n "$digest" ]; then
              DIGESTS+=("$IMAGE@$digest")
            fi
          done
          TAG_ARGS=()
          while IFS= read -r tag; do
            TAG_ARGS+=("-t" "$tag")
          done < <(printf '%s\n' "$TAGS" | awk 'NF && !seen[$0]++')
          echo "Tags:"
          printf '  %s\n' "${TAG_ARGS[@]}"
          echo "Sources:"
          printf '  %s\n' "${DIGESTS[@]}"
          docker buildx imagetools create "${TAG_ARGS[@]}" "${DIGESTS[@]}"

  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package and validate chart
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p dist
          helm package deploy/kubernetes/helm --version "$VERSION" --app-version "$VERSION" --destination dist
          echo "Chart packaged: dist/layerhouse-$VERSION.tgz"

      - name: Upload chart to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          for attempt in {1..120}; do
            if gh release view "$VERSION" >/dev/null 2>&1; then
              gh release upload "$VERSION" "dist/layerhouse-$VERSION.tgz" --clobber
              exit 0
            fi
            echo "Waiting for cargo-dist release $VERSION ($attempt/120)"
            sleep 10
          done
          echo "Release $VERSION was not created in time" >&2
          exit 1
