name: Release Artifacts

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-artifacts-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: adamcavendish/orb-chrysa-server

jobs:
  # Cross-compile the server binary for all target architectures using
  # cargo-zigbuild (no QEMU needed). The dashboard SPA is embedded at compile
  # time via rust-embed, so it's built here too (once, arch-independent).
  docker-image-build-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,armv7-unknown-linux-gnueabihf

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.14.0"

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-zigbuild
        run: cargo binstall cargo-zigbuild --version 0.19.7 -y

      - name: Install vp (vite-plus) and Node
        run: |
          export VP_HOME="$HOME/.vite-plus"
          export VP_NODE_MANAGER=yes
          export VP_NODE_VERSION=24.15.0
          mkdir -p "$VP_HOME"
          curl -fsSL https://viteplus.dev/install.sh | bash
          echo "$VP_HOME/bin" >> "$GITHUB_PATH"
          echo "VP_HOME=$VP_HOME" >> "$GITHUB_ENV"

      - name: Install dashboard dependencies
        run: vp install
        working-directory: crates/orb-chrysa-server/dashboard

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-targets: true

      - name: Build all targets
        run: |
          cargo zigbuild --release -p orb-chrysa-server \
            --target x86_64-unknown-linux-gnu \
            --target aarch64-unknown-linux-gnu \
            --target armv7-unknown-linux-gnueabihf

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: |
            target/x86_64-unknown-linux-gnu/release/orb-chrysa-server
            target/aarch64-unknown-linux-gnu/release/orb-chrysa-server
            target/armv7-unknown-linux-gnueabihf/release/orb-chrysa-server
          retention-days: 1

  # One matrix job per architecture. Each copies its pre-built binary from
  # the zigbuild artifact into a minimal Docker image and pushes by digest
  # (no tag race between parallel jobs).
  docker-image:
    needs: docker-image-build-binaries
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arch: linux/amd64
            target: x86_64-unknown-linux-gnu
            slug: linux-amd64
          - arch: linux/arm64
            target: aarch64-unknown-linux-gnu
            slug: linux-arm64
          - arch: linux/arm/v7
            target: armv7-unknown-linux-gnueabihf
            slug: linux-armv7
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Copy ${{ matrix.platform.target }} binary
        run: |
          cp "target/${{ matrix.platform.target }}/release/orb-chrysa-server" ./orb-chrysa-server
          chmod +x ./orb-chrysa-server

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/ci/Dockerfile.runtime
          platforms: ${{ matrix.platform.arch }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.platform.slug }}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.platform.slug }}
          path: /tmp/digests/${{ matrix.platform.slug }}
          retention-days: 1

  # Stitch the per-architecture images into a single multi-arch manifest
  # and push with all the release tags.
  docker-image-merge:
    needs: docker-image
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Create manifest list and push
        run: |
          DIGESTS=""
          for f in /tmp/digests/*; do
            DIGESTS="$DIGESTS $(cat "$f")"
          done
          TAGS=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "${{ steps.meta.outputs.json }}")
          echo "Tags: $TAGS"
          echo "Digests: $DIGESTS"
          docker buildx imagetools create $TAGS $DIGESTS

  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package and validate chart
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p dist
          helm package deploy/kubernetes/helm --version "$VERSION" --app-version "$VERSION" --destination dist
          echo "Chart packaged: dist/orb-chrysa-$VERSION.tgz"

      - name: Upload chart to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz
