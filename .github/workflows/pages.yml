name: GitHub Pages

on:
  push:
    branches: [master]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install mdbook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Cache mdbook-mermaid
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook-mermaid
          key: mdbook-mermaid-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install mdbook-mermaid
        run: |
          if [ -f ~/.cargo/bin/mdbook-mermaid ]; then
            echo "mdbook-mermaid found in cache"
          else
            cargo install --locked mdbook-mermaid
          fi

      - name: Build book
        run: cd docs/mdbook && mdbook build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/mdbook/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
