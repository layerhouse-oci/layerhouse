name: CI

on: [push, pull_request]

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash

env:
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1
  rust_min: "1.92"
  ORB_CHRYSA_SKIP_DASHBOARD: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@just
      - run: just fmt

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - run: just clippy

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - run: cargo doc --workspace --no-deps

  basics:
    name: Basics
    runs-on: ubuntu-latest
    needs: [fmt, clippy, doc]
    steps:
      - run: exit 0

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [basics]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - run: just test

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    needs: [basics]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.rust_min }}
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - run: cargo check --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [basics]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: coverage
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@just
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - run: just coverage-nextest
      - uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    needs: [basics]
    env:
      ORB_CHRYSA_SKIP_DASHBOARD: ""
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - name: Install
        working-directory: crates/orb-chrysa-server/dashboard
        run: vp install
      - name: Build
        working-directory: crates/orb-chrysa-server/dashboard
        run: vp build

  dockerfile-lint:
    name: Dockerfile check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - Dockerfile
          - deploy/ci/Dockerfile.runtime
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: error

  helm-check:
    name: Helm check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - uses: taiki-e/install-action@just
      - run: just helm-check

  docs-check:
    name: Docs check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - name: Cache mdbook-mermaid
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook-mermaid
          key: mdbook-mermaid-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Install mdbook-mermaid
        run: |
          if [ -f ~/.cargo/bin/mdbook-mermaid ]; then
            echo "mdbook-mermaid found in cache"
          else
            cargo install --locked mdbook-mermaid
          fi
      - run: cd docs/mdbook && mdbook build

  docker-image-build-binaries:
    name: Docker image / build-binaries
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, dockerfile-lint]
    runs-on: ubuntu-latest
    env:
      ORB_CHRYSA_SKIP_DASHBOARD: ""
      REGISTRY: ghcr.io
      IMAGE_NAME: adamcavendish/orb-chrysa-server
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.14.0"

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-zigbuild
        run: cargo binstall cargo-zigbuild --version 0.19.7 -y

      - name: Install vp (vite-plus) and Node
        run: |
          export VP_HOME="$HOME/.vite-plus"
          export VP_NODE_MANAGER=yes
          export VP_NODE_VERSION=24.15.0
          mkdir -p "$VP_HOME"
          curl -fsSL https://viteplus.dev/install.sh | bash
          echo "$VP_HOME/bin" >> "$GITHUB_PATH"
          echo "VP_HOME=$VP_HOME" >> "$GITHUB_ENV"

      - name: Install dashboard dependencies
        run: vp install
        working-directory: crates/orb-chrysa-server/dashboard

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-targets: true

      - name: Build all targets
        run: |
          cargo zigbuild --release -p orb-chrysa-server \
            --target x86_64-unknown-linux-gnu \
            --target aarch64-unknown-linux-gnu

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: docker-image-binaries
          path: |
            target/x86_64-unknown-linux-gnu/release/orb-chrysa-server
            target/aarch64-unknown-linux-gnu/release/orb-chrysa-server
          retention-days: 1

  docker-image:
    name: Docker image (${{ matrix.platform.slug }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docker-image-build-binaries]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arch: linux/amd64
            target: x86_64-unknown-linux-gnu
            slug: linux-amd64
          - arch: linux/arm64
            target: aarch64-unknown-linux-gnu
            slug: linux-arm64
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: adamcavendish/orb-chrysa-server
    steps:
      - uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: docker-image-binaries
          path: target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy ${{ matrix.platform.target }} binary
        run: |
          cp "target/${{ matrix.platform.target }}/release/orb-chrysa-server" ./orb-chrysa-server
          chmod +x ./orb-chrysa-server

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/ci/Dockerfile.runtime
          platforms: ${{ matrix.platform.arch }}
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true

      - name: Export digest
        run: echo "${{ steps.build.outputs.digest }}" > "${{ matrix.platform.slug }}.digest"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.platform.slug }}
          path: ${{ matrix.platform.slug }}.digest
          retention-days: 1

  docker-image-merge:
    name: Docker image (merge)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docker-image]
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: adamcavendish/orb-chrysa-server
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          DIGESTS=""
          for f in *.digest; do
            DIGESTS="$DIGESTS $IMAGE@$(cat "$f")"
          done
          echo "Sources: $DIGESTS"
          docker buildx imagetools create -t $IMAGE:latest $DIGESTS
