name: CI

on: [push, pull_request]

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1
  rust_min: "1.92"
  ORB_CHRYSA_SKIP_DASHBOARD: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@just
      - run: just fmt

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - run: just clippy

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - run: cargo doc --workspace --no-deps

  basics:
    name: Basics
    runs-on: ubuntu-latest
    needs: [fmt, clippy, doc]
    steps:
      - run: exit 0

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [basics]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - run: just test

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    needs: [basics]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.rust_min }}
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - run: cargo check --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [basics]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: coverage
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@just
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - run: just coverage-nextest
      - uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    needs: [basics]
    env:
      ORB_CHRYSA_SKIP_DASHBOARD: ""
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
      - name: Install
        working-directory: crates/orb-chrysa-server/dashboard
        run: vp install
      - name: Build
        working-directory: crates/orb-chrysa-server/dashboard
        run: vp build

  dockerfile-lint:
    name: Dockerfile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  helm-check:
    name: Helm check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - uses: taiki-e/install-action@just
      - run: just helm-check

  docs-check:
    name: Docs check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - name: Cache mdbook-mermaid
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook-mermaid
          key: mdbook-mermaid-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Install mdbook-mermaid
        run: |
          if [ -f ~/.cargo/bin/mdbook-mermaid ]; then
            echo "mdbook-mermaid found in cache"
          else
            cargo install --locked mdbook-mermaid
          fi
      - run: cd docs/mdbook && mdbook build
